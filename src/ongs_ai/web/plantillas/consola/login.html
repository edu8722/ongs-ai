{% extends "base.html" %}
{% block titulo %}Consola del operador — ONGs-AI{% endblock %}
{% block contenido %}
<h1>Consola del operador</h1>
{% if mensaje %}
  <p class="mensaje">{{ mensaje }}</p>
{% endif %}
<form method="post" action="/consola/login">
  <label for="clave">Clave de operador</label><br>
  <input type="password" id="clave" name="clave" required>
  <button type="submit">Entrar</button>
</form>
{% endblock %}
